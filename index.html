<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="家計簿">
<meta name="theme-color" content="#1baf7a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<title>家計簿</title>
<style>
:root {
  --surface-1: #fcfcfb;
  --page: #f9f9f7;
  --ink-1: #0b0b0b;
  --ink-2: #52514e;
  --muted: #898781;
  --grid: #e1e0d9;
  --baseline: #c3c2b7;
  --border: rgba(11,11,11,0.10);
  --accent: #1baf7a;
  --exp: #d03b3b;    /* 支出 */
  --inc: #0ca30c;    /* 収入 */
  --danger: #d03b3b;
}
@media (prefers-color-scheme: dark) {
  :root {
    --surface-1: #1a1a19;
    --page: #0d0d0d;
    --ink-1: #ffffff;
    --ink-2: #c3c2b7;
    --muted: #898781;
    --grid: #2c2c2a;
    --baseline: #383835;
    --border: rgba(255,255,255,0.10);
    --accent: #199e70;
    --exp: #e66767;
    --inc: #0ca30c;
    --danger: #e66767;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; height: 100%; }
/* 画面の高さに固定し、mainだけをスクロールさせる。
   上下のセーフエリア（時計・ホームバー）はenv()で端末ごとに自動確保 */
body {
  font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
  background: var(--page);
  color: var(--ink-1);
  font-size: 16px;
  /* --appH はJS(fitViewport)が実測のwindow.innerHeightで上書きする。
     iOSスタンドアロンの100dvh過少計算バグ対策 */
  height: 100vh;
  height: var(--appH, 100dvh);
  display: flex;
  flex-direction: column;
  padding-top: var(--safe-top, env(safe-area-inset-top));
  overflow: hidden;
}
main {
  flex: 1 1 0;
  min-height: 0;
  width: 100%;
  max-width: 640px;
  margin: 0 auto;
  padding: 0 12px 24px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
}
/* カレンダータブ: グリッド部（.cal-fixed）は固定し、下部の明細（.cal-scroll）だけスクロール */
main.calmode { display: flex; flex-direction: column; overflow: hidden; padding-bottom: 0; }
.cal-fixed { flex-shrink: 0; }
.cal-scroll {
  flex: 1 1 0; min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  padding-bottom: 24px;
}
h1 { font-size: 18px; padding: 14px 4px 6px; }
h2 { font-size: 14px; color: var(--ink-2); font-weight: 600; margin: 16px 4px 8px; }
.card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
}
button {
  font: inherit;
  color: var(--ink-1);
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
button.primary { background: var(--accent); color: #fff; border-color: transparent; font-weight: 600; }
button.ghost { background: transparent; border-color: transparent; color: var(--accent); }
button.danger { color: var(--danger); }
input, select {
  font: inherit;
  color: var(--ink-1);
  background: var(--page);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
}
input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
.num { font-variant-numeric: tabular-nums; }
.amt-exp { color: var(--exp); }
.amt-inc { color: var(--inc); }

/* ボトムナビ（flexレイアウトの最下段。fixedにしない） */
nav {
  flex-shrink: 0;
  display: flex;
  background: var(--surface-1);
  border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
}
nav button {
  flex: 1; border: none; border-radius: 0; background: none;
  padding: 8px 0 6px; font-size: 10px; color: var(--muted);
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
nav button .ico { font-size: 20px; line-height: 1; }
nav button.active { color: var(--accent); font-weight: 600; }

/* 入力 */
.kindtabs { display: flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
.kindtabs button { flex: 1; border: none; border-radius: 0; padding: 10px; color: var(--muted); background: var(--surface-1); font-weight: 600; }
.kindtabs button.on-exp { background: var(--exp); color: #fff; }
.kindtabs button.on-inc { background: var(--inc); color: #fff; }
.editbar { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-2); margin-bottom: 8px; }
.frow {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;
  padding: 6px 10px; margin-bottom: 8px; min-height: 50px;
}
.frow .flabel { width: 3.2em; color: var(--ink-2); font-size: 14px; flex-shrink: 0; }
.frow input { flex: 1; border: none; background: none; padding: 6px 4px; min-width: 0; }
.frow .dnav { min-width: 38px; border: none; background: none; color: var(--muted); }
.amtbox {
  flex: 1; display: flex; justify-content: flex-end; align-items: baseline; gap: 6px;
  font-size: 26px; font-weight: 600; font-variant-numeric: tabular-nums; cursor: pointer; padding: 2px 4px;
}
.amtbox .en { font-size: 14px; color: var(--ink-2); font-weight: 400; }
.catgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.catgrid button {
  min-height: 74px; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 4px; justify-content: center;
  padding: 8px 4px; overflow: hidden;
}
.catgrid button.sel { outline: 2px solid var(--accent); outline-offset: -2px; font-weight: 700; }
.cicon { font-size: 24px; line-height: 1; }
.eicon { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }
.cdot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.bigsubmit {
  width: 100%; min-height: 52px; font-size: 17px; font-weight: 700;
  background: var(--accent); color: #fff; border: none; border-radius: 26px; margin: 14px 0 4px;
}
/* 金額テンキー（mainとナビの間に挟まる通常要素。fixedは使わない） */
#padhost { flex-shrink: 0; width: 100%; max-width: 640px; margin: 0 auto; }
.padwrap {
  background: var(--surface-1); border-top: 1px solid var(--border);
  padding: 8px 10px;
  box-shadow: 0 -4px 16px rgba(0,0,0,.25);
}
.padhead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; padding: 0 4px; }
.pad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.pad button { min-height: 52px; font-size: 20px; font-weight: 600; }
.pad button.ok { background: var(--accent); color: #fff; border-color: transparent; }
.entry-row { display: flex; align-items: center; gap: 8px; padding: 9px 2px; border-bottom: 1px solid var(--grid); cursor: pointer; }
.entry-row:last-child { border-bottom: none; }
.entry-row .cname { font-weight: 600; flex-shrink: 0; }
.entry-row .memo { color: var(--muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.entry-row .amt { margin-left: auto; font-variant-numeric: tabular-nums; font-weight: 600; flex-shrink: 0; }

/* サマリ行 */
.sumline { display: flex; gap: 4px; text-align: center; }
.sumline div { flex: 1; }
.sumline .lb { font-size: 11px; color: var(--muted); }
.sumline .v { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }

/* カレンダー */
.cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.cal-head .ym { font-size: 17px; font-weight: 700; }
.cal-head button { min-width: 44px; }
table.cal { width: 100%; border-collapse: collapse; table-layout: fixed; }
table.cal th { font-size: 11px; color: var(--muted); font-weight: 500; padding: 4px 0; }
table.cal td {
  height: 56px; vertical-align: top; text-align: center;
  border-top: 1px solid var(--grid); cursor: pointer; padding: 2px 1px;
}
table.cal td.selday { background: rgba(27,175,122,0.12); border-radius: 8px; }
table.cal td .d { font-size: 12px; }
table.cal td.today .d {
  display: inline-block; min-width: 20px; line-height: 20px;
  background: var(--accent); color: #fff; border-radius: 10px; font-weight: 600;
}
table.cal td .ce, table.cal td .ci { font-size: 9.5px; font-variant-numeric: tabular-nums; overflow: hidden; white-space: nowrap; }
table.cal td .ce { color: var(--exp); }
table.cal td .ci { color: var(--inc); }

/* レポート */
.chips { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.chips button { padding: 6px 12px; font-size: 13px; border-radius: 16px; }
.chips button.on { background: var(--accent); color: #fff; border-color: transparent; }
.repsum { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.repsum .box {
  flex: 1 1 40%; background: var(--page); border: 1px solid var(--border); border-radius: 10px;
  padding: 8px 10px; font-size: 13px; display: flex; justify-content: space-between; align-items: center;
}
.repsum .box b { font-size: 16px; font-variant-numeric: tabular-nums; }
.repsum .box.net { flex-basis: 100%; }
.budget-sub { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 4px; font-variant-numeric: tabular-nums; }
.rep-row { display: flex; align-items: center; gap: 8px; padding: 8px 2px; border-bottom: 1px solid var(--grid); }
.rep-row:last-child { border-bottom: none; }
.rep-row .pct { color: var(--muted); font-size: 12px; width: 48px; text-align: right; font-variant-numeric: tabular-nums; }
.rep-row .amt { margin-left: auto; font-variant-numeric: tabular-nums; font-weight: 600; }
.budget-row { padding: 8px 2px; border-bottom: 1px solid var(--grid); }
.budget-row:last-child { border-bottom: none; }
.budget-top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.budget-top .amt { margin-left: auto; font-size: 13px; font-variant-numeric: tabular-nums; color: var(--ink-2); }
.bar { height: 8px; background: var(--grid); border-radius: 4px; overflow: hidden; }
.bar i { display: block; height: 100%; border-radius: 4px; background: var(--accent); }
.bar i.over { background: var(--danger); }
.empty { color: var(--muted); font-size: 13px; padding: 24px 0; text-align: center; }

/* 設定 */
.exrow { display: flex; gap: 6px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--grid); }
.exrow:last-child { border-bottom: none; }
.exrow input.nm { flex: 1; min-width: 60px; }
.icsel { width: 54px; padding: 6px 2px; font-size: 18px; flex-shrink: 0; }
.colsel { width: 34px; height: 34px; padding: 2px; border: 1px solid var(--border); border-radius: 8px; background: var(--page); flex-shrink: 0; }
.drag { cursor: grab; touch-action: none; padding: 8px 6px; color: var(--muted); font-size: 16px; flex-shrink: 0; user-select: none; -webkit-user-select: none; }
.exrow.dragging { opacity: .55; background: var(--page); border-radius: 8px; }
.exrow button { padding: 6px 8px; font-size: 13px; }
.catsec { font-size: 12px; font-weight: 700; color: var(--muted); margin: 12px 0 2px; }
/* 予算編集ビュー */
.edithead { display: flex; align-items: center; justify-content: space-between; margin: 4px 0 10px; }
.edithead .ttl { font-size: 17px; font-weight: 700; }
.budrow-edit { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--grid); }
.budrow-edit:last-of-type { border-bottom: none; }
.budrow-edit .cname { flex: 1; min-width: 0; }
.budrow-edit input { width: 120px; text-align: right; }
.addrow { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.addrow input, .addrow select { min-width: 0; }
.setting-actions { display: flex; flex-direction: column; gap: 8px; }
.setting-actions button { text-align: left; }
.hint { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
.recrow { display: flex; align-items: center; gap: 8px; padding: 8px 2px; border-bottom: 1px solid var(--grid); font-size: 14px; }
.recrow:last-child { border-bottom: none; }
.recrow .detail { flex: 1; min-width: 0; }
.recrow .detail .sub { font-size: 12px; color: var(--muted); }
.recrow.paused .detail { color: var(--muted); }
</style>
</head>
<body>
<main id="main"></main>
<div id="padhost"></div>
<nav id="nav"></nav>
<input type="file" id="importFile" accept=".json,application/json" style="display:none">
<script>
'use strict';
/* ================= ストア ================= */
const LS_KEY = 'kakeibo.v1';
// カテゴリ色プール（先頭8色はdataviz検証済みパレット、以降は同系の濃色変種。凡例・ラベル併記前提）
const COLOR_POOL = [
  '#2a78d6', '#1baf7a', '#eda100', '#008300', '#4a3aa7', '#e34948', '#e87ba4', '#eb6834',
  '#1c5cab', '#0e7d57', '#c98500', '#005c00', '#9085e9', '#a83432', '#d55181', '#a8491f',
];
const DEFAULT_EXP = ['食費', '日用品', '衣服・アクセサリー', '美容・健康・教育', '交際費', '光熱費', '交通費', '通信費', '住居費', 'ふるさと納税', 'ギャンブル', '臨時交際費', 'その他'];
const DEFAULT_INC = ['給料', 'ポイント利用', 'ギャンブル', '賞与', '投資', '臨時収入', 'メルカリ', 'その他'];
// カテゴリに選べるアイコン
const ICONS = ['🍽️', '🍙', '☕', '🍰', '🛒', '🧴', '🧻', '👕', '👗', '👟', '💄', '💊', '📚', '🍻', '🥂', '🎁', '💡', '🚿', '🚃', '🚗', '✈️', '📱', '💻', '🏠', '🎰', '⚽', '🎮', '🎬', '🏋️', '🐷', '💰', '💴', '📈', '📦', '🅿️', '🎉', '✨', '❓'];
const DEFAULT_CAT_ICONS = {
  '食費': '🍽️', '日用品': '🧴', '衣服・アクセサリー': '👕', '美容・健康・教育': '💄', '交際費': '🍻',
  '光熱費': '💡', '交通費': '🚃', '通信費': '📱', '住居費': '🏠', 'ふるさと納税': '🎁',
  'ギャンブル': '🎰', '臨時交際費': '🥂', 'その他': '🐷',
  '給料': '💰', 'ポイント利用': '🅿️', '賞与': '🎉', '投資': '📈', '臨時収入': '💴', 'メルカリ': '📦',
};

function defaultCategories() {
  const cats = [];
  DEFAULT_EXP.forEach((name, i) => cats.push({ id: 'e' + i, name, kind: 'exp', color: COLOR_POOL[i % COLOR_POOL.length] }));
  DEFAULT_INC.forEach((name, i) => cats.push({ id: 'i' + i, name, kind: 'inc', color: COLOR_POOL[i % COLOR_POOL.length] }));
  return cats;
}

let store = loadStore();

function loadStore() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s && Array.isArray(s.categories) && Array.isArray(s.entries)) return normalize(s);
    }
  } catch (e) { /* 壊れていたら初期化 */ }
  const init = normalize({ version: 1, categories: defaultCategories(), entries: [], budgets: {}, recurring: [] });
  localStorage.setItem(LS_KEY, JSON.stringify(init));
  return init;
}
function normalize(s) {
  if (!s.budgets) s.budgets = {};
  if (!s.recurring) s.recurring = [];
  if (!s.version) s.version = 1;
  // 予算: 旧形式（catId→金額の単一マップ）→ 新形式（'YYYY-MM'→{total,cats}の月別スナップショット）へ移行
  {
    const oldCats = {};
    let hasOld = false;
    for (const key of Object.keys(s.budgets)) {
      if (!/^\d{4}-\d{2}$/.test(key)) { oldCats[key] = s.budgets[key]; delete s.budgets[key]; hasOld = true; }
    }
    if (hasOld) s.budgets[todayIso().slice(0, 7)] = { total: 0, cats: oldCats };
    for (const key of Object.keys(s.budgets)) {
      const b = s.budgets[key];
      if (!b || typeof b !== 'object') s.budgets[key] = { total: Number(b) || 0, cats: {} };
      else { if (!b.cats) b.cats = {}; b.total = Number(b.total) || 0; }
    }
  }
  // カテゴリにアイコンがなければ名前から補完
  for (const c of s.categories) {
    if (!c.icon) c.icon = DEFAULT_CAT_ICONS[c.name] || (c.kind === 'exp' ? '🐷' : '💰');
  }
  // 固定費: 旧形式（day/endYm）→ 新形式（startDate/endDate）へ移行
  for (const r of s.recurring) {
    if (!r.startDate) {
      const day = r.day || 1;
      const baseYm = r.lastApplied || todayIso().slice(0, 7);
      r.startDate = clampDateInYm(baseYm, day);
      r.endDate = r.endYm ? clampDateInYm(r.endYm, day) : null;
      delete r.day;
      delete r.endYm;
    }
  }
  return s;
}
function save() { localStorage.setItem(LS_KEY, JSON.stringify(store)); }

function catById(id) { return store.categories.find(c => c.id === id); }
function catsOf(kind, includeHidden) {
  return store.categories.filter(c => c.kind === kind && (includeHidden || !c.hidden));
}
function newId(prefix) { return prefix + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
// 入力タブのタイルに出すカテゴリ（noInput=trueは固定費専用などで手入力しない）
function inputCatsOf(kind) { return catsOf(kind).filter(c => !c.noInput); }
// 指定月に適用される予算: その月以前で最後に保存されたスナップショット。
// 最初の設定より前の月には最初の設定を適用（=一度設定すれば全期間に効く）
function budgetForYm(ym) {
  const yms = Object.keys(store.budgets).sort();
  if (!yms.length) return { total: 0, cats: {} };
  let pick = yms[0];
  for (const k of yms) if (k <= ym) pick = k;
  const b = store.budgets[pick] || {};
  return { total: Number(b.total) || 0, cats: b.cats || {} };
}

/* ================= ユーティリティ ================= */
const WD = ['日', '月', '火', '水', '木', '金', '土'];
function todayIso() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function isoToDate(iso) { const [y, m, d] = iso.split('-').map(Number); return new Date(y, m - 1, d); }
function fmtIso(iso) {
  const [, m, d] = iso.split('-').map(Number);
  return `${m}/${d}(${WD[isoToDate(iso).getDay()]})`;
}
function shiftDate(iso, days) {
  const d = isoToDate(iso);
  d.setDate(d.getDate() + days);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function ymLabel(ym) { const [y, m] = ym.split('-'); return `${y}年${Number(m)}月`; }
function shiftYm(ym, n) {
  let [y, m] = ym.split('-').map(Number);
  m += n;
  while (m < 1) { m += 12; y--; }
  while (m > 12) { m -= 12; y++; }
  return `${y}-${String(m).padStart(2, '0')}`;
}
function daysInYm(ym) { const [y, m] = ym.split('-').map(Number); return new Date(y, m, 0).getDate(); }
function clampDateInYm(ym, day) { return ym + '-' + String(Math.min(day, daysInYm(ym))).padStart(2, '0'); }
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
function yen(n) { return '¥' + Number(n).toLocaleString('ja-JP'); }

function entriesOfYm(ym) { return store.entries.filter(e => e.date.startsWith(ym)); }
function kindOf(e) { const c = catById(e.catId); return c ? c.kind : 'exp'; }
function sumBy(entries) {
  let exp = 0, inc = 0;
  for (const e of entries) { if (kindOf(e) === 'exp') exp += e.amount; else inc += e.amount; }
  return { exp, inc, net: inc - exp };
}

/* ================= 固定費・固定収入の自動記帳 ================= */
// 開始日から毎月同じ日（月末クランプ）に、当日以降アプリを開いたときに記帳する。
// lastApplied=null なら開始月から。終了日を過ぎたら記帳しない
function recDay(r) { return Number(r.startDate.slice(8, 10)); }
function applyRecurring() {
  const today = todayIso();
  let added = 0;
  for (const r of store.recurring) {
    if (r.paused || !r.startDate) continue;
    let ym = r.lastApplied ? shiftYm(r.lastApplied, 1) : r.startDate.slice(0, 7);
    while (true) {
      const date = clampDateInYm(ym, recDay(r));
      if (date < r.startDate) { ym = shiftYm(ym, 1); continue; }
      if (r.endDate && date > r.endDate) break;
      if (date > today) break;
      store.entries.push({ id: newId('n'), date, catId: r.catId, amount: r.amount, memo: r.memo || '', recId: r.id });
      r.lastApplied = ym;
      ym = shiftYm(ym, 1);
      added++;
    }
  }
  if (added) save();
  return added;
}
// 指定月に発生予定の固定費の合計（支出・収入別）。「来月の固定費」表示に使う
function recurringForYm(ym) {
  let exp = 0, inc = 0;
  for (const r of store.recurring) {
    if (r.paused || !r.startDate) continue;
    const date = clampDateInYm(ym, recDay(r));
    if (date < r.startDate) continue;
    if (r.endDate && date > r.endDate) continue;
    const c = catById(r.catId);
    if (c && c.kind === 'inc') inc += r.amount; else exp += r.amount;
  }
  return { exp, inc };
}

/* ================= 画面状態 ================= */
const state = {
  tab: 'input',
  date: todayIso(),      // 入力対象日
  kind: 'exp',
  selCat: null,
  amount: '',            // 入力中の金額（文字列）
  memo: '',
  padOpen: false,        // 金額テンキーの表示状態
  editId: null,          // 編集中エントリid
  calYm: todayIso().slice(0, 7),
  calSel: todayIso(),
  budYm: todayIso().slice(0, 7),
  budEdit: null,         // 予算編集ビューの対象月（null=通常表示）
  budDraft: null,        // 予算編集ビューの下書き {total, cats}
  budDirty: false,       // 予算下書きに未保存の変更があるか
  repYm: todayIso().slice(0, 7),
  repYear: Number(todayIso().slice(0, 4)),
  repMode: 'month',          // 'month' | 'year'
  repKind: 'exp',
  setKind: 'exp',        // 設定画面のカテゴリタブ
};

/* ================= ナビ ================= */
const TABS = [
  { id: 'input',    ico: '✏️', label: '入力' },
  { id: 'cal',      ico: '📅', label: 'カレンダー' },
  { id: 'report',   ico: '📊', label: 'レポート' },
  { id: 'budget',   ico: '👛', label: '予算' },
  { id: 'settings', ico: '⚙️', label: '設定' },
];
function renderNav() {
  document.getElementById('nav').innerHTML = TABS.map(t =>
    `<button class="${state.tab === t.id ? 'active' : ''}" onclick="go('${t.id}')"><span class="ico">${t.ico}</span>${t.label}</button>`
  ).join('');
}
function toTop() { const m = document.getElementById('main'); if (m) m.scrollTop = 0; }
// 入力タブの状態を初期値に戻す（タブを離れたときに呼ぶ）
function resetInput() {
  state.editId = null; state.amount = ''; state.memo = ''; state.selCat = null;
  state.kind = 'exp'; state.date = todayIso(); state.padOpen = false;
}
function go(tab) {
  if (state.tab === 'input' && tab !== 'input') resetInput();
  if (state.tab === 'budget' && tab !== 'budget') { state.budEdit = null; state.budDraft = null; state.budDirty = false; }
  state.tab = tab; render(); toTop();
}

function render() {
  renderNav();
  const main = document.getElementById('main');
  // カレンダータブだけmain自体のスクロールを止め、内側の.cal-scrollをスクロールさせる
  main.className = state.tab === 'cal' ? 'calmode' : '';
  // テンキーは入力タブ以外では常に閉じる
  if (state.tab !== 'input') document.getElementById('padhost').innerHTML = '';
  if (state.tab === 'input') renderInput(main);
  else if (state.tab === 'cal') renderCal(main);
  else if (state.tab === 'report') renderReport(main);
  else if (state.tab === 'budget') renderBudget(main);
  else renderSettings(main);
}

/* ================= 入力 ================= */
function renderInput(main) {
  const cats = inputCatsOf(state.kind).slice();
  const editing = state.editId != null;
  const kindLabel = state.kind === 'exp' ? '支出' : '収入';
  // 入力タブ非表示のカテゴリでも、既存記録の編集中はタイルを出す（固定費で記帳した記録の修正用）
  if (editing && state.selCat) {
    const c = catById(state.selCat);
    if (c && c.kind === state.kind && !cats.includes(c)) cats.push(c);
  }

  let html = `
  <div class="kindtabs" style="margin-top:10px">
    <button class="${state.kind === 'exp' ? 'on-exp' : ''}" onclick="setKind('exp')">支出</button>
    <button class="${state.kind === 'inc' ? 'on-inc' : ''}" onclick="setKind('inc')">収入</button>
  </div>
  ${editing ? `<div class="editbar">記録を編集中 <button class="ghost" onclick="cancelEdit()">キャンセル</button><button class="ghost danger" onclick="deleteEntry()">削除</button></div>` : ''}
  <div class="frow">
    <span class="flabel">日付</span>
    <button class="dnav" onclick="chDate(-1)" aria-label="前日">◀</button>
    <input type="date" value="${state.date}" onfocus="closePadSoft()" onchange="setDate(this.value)">
    <button class="dnav" onclick="chDate(1)" aria-label="翌日">▶</button>
  </div>
  <div class="frow">
    <span class="flabel">メモ</span>
    <input type="text" placeholder="未入力" value="${esc(state.memo)}" onfocus="closePadSoft()" onchange="state.memo = this.value">
  </div>
  <div class="frow" onclick="openPad()">
    <span class="flabel">${kindLabel}</span>
    <div class="amtbox">${state.amount ? Number(state.amount).toLocaleString('ja-JP') : '<span style="color:var(--muted)">0</span>'}<span class="en">円</span></div>
  </div>
  <h2>カテゴリー</h2>` +
    (cats.length ? `<div class="catgrid">` +
      cats.map(c => `<button class="${state.selCat === c.id ? 'sel' : ''}" onclick="selectCat('${c.id}')">
        <span class="cicon">${esc(c.icon || '')}</span><span>${esc(c.name)}</span></button>`).join('') + `
    </div>` : `<div class="hint">入力タブに表示するカテゴリがありません。設定 → カテゴリ管理で「入力タブで表示」へドラッグしてください。</div>`) + `
  <button class="bigsubmit" onclick="saveEntry()">${editing ? '更新する' : kindLabel + 'を入力する'}</button>`;

  main.innerHTML = html;

  // 金額入力用テンキー（金額ボックスをタップすると、mainとナビの間に表示）
  document.getElementById('padhost').innerHTML = state.padOpen ? `
    <div class="padwrap">
      <div class="padhead">
        <span class="num" style="font-size:20px;font-weight:700">${state.amount ? yen(Number(state.amount)) : '¥0'}</span>
        <button class="ghost" onclick="closePad()">完了</button>
      </div>
      <div class="pad">
        <button onclick="pad('7')">7</button><button onclick="pad('8')">8</button><button onclick="pad('9')">9</button><button onclick="padBack()">⌫</button>
        <button onclick="pad('4')">4</button><button onclick="pad('5')">5</button><button onclick="pad('6')">6</button><button onclick="padClear()">AC</button>
        <button onclick="pad('1')">1</button><button onclick="pad('2')">2</button><button onclick="pad('3')">3</button><button class="ok" onclick="closePad()">OK</button>
        <button onclick="pad('0')">0</button><button onclick="pad('00')">00</button>
      </div>
    </div>` : '';
}
function entryRowHtml(e) {
  const c = catById(e.catId) || { name: '?', color: '#888', kind: 'exp', icon: '❓' };
  const sign = c.kind === 'exp' ? '-' : '+';
  return `<div class="entry-row" onclick="openEntry('${e.id}')">
    <span class="eicon">${esc(c.icon || '')}</span>
    <span class="cname">${esc(c.name)}</span>
    <span class="memo">${esc(e.memo || '')}</span>
    <span class="amt amt-${c.kind}">${sign}${yen(e.amount)}</span>
  </div>`;
}
function setDate(v) { if (v) { state.date = v; state.padOpen = false; render(); } }
function chDate(n) { state.date = shiftDate(state.date, n); state.padOpen = false; render(); }
function setKind(k) { state.kind = k; state.selCat = null; state.padOpen = false; render(); }
function selectCat(id) { state.selCat = id; state.padOpen = false; render(); }
function openPad() { state.padOpen = true; render(); }
function closePad() { state.padOpen = false; render(); }
// テンキー表示中に他の入力欄（メモ・日付）へフォーカスが移ったらテンキーだけ閉じる。
// render()するとフォーカスが外れてOSキーボードが開かないため、padhostのみ消して再描画しない
function closePadSoft() {
  if (!state.padOpen) return;
  state.padOpen = false;
  const ph = document.getElementById('padhost');
  if (ph) ph.innerHTML = '';
}
function pad(d) {
  if (state.amount.length >= 9) return;
  state.amount = (state.amount + d).replace(/^0+(?=\d)/, '');
  render();
}
function padBack() { state.amount = state.amount.slice(0, -1); render(); }
function padClear() { state.amount = ''; render(); }
function saveEntry() {
  const amount = Number(state.amount);
  if (!state.selCat) { alert('カテゴリを選んでください'); return; }
  if (!amount || amount <= 0) { alert('金額を入力してください'); return; }
  if (state.editId != null) {
    const e = store.entries.find(x => x.id === state.editId);
    if (e) { e.date = state.date; e.catId = state.selCat; e.amount = amount; e.memo = state.memo; }
    state.editId = null;
  } else {
    store.entries.push({ id: newId('n'), date: state.date, catId: state.selCat, amount, memo: state.memo });
  }
  state.amount = ''; state.memo = ''; state.selCat = null; state.padOpen = false;
  save(); render();
}
function openEntry(id) {
  const e = store.entries.find(x => x.id === id);
  if (!e) return;
  const c = catById(e.catId);
  state.tab = 'input';
  state.editId = id;
  state.date = e.date;
  state.kind = c ? c.kind : 'exp';
  state.selCat = e.catId;
  state.amount = String(e.amount);
  state.memo = e.memo || '';
  render(); toTop();
}
function cancelEdit() {
  state.editId = null; state.amount = ''; state.memo = ''; state.selCat = null; state.padOpen = false;
  render();
}
function deleteEntry() {
  if (!confirm('この記録を削除しますか？')) return;
  store.entries = store.entries.filter(x => x.id !== state.editId);
  state.editId = null; state.amount = ''; state.memo = ''; state.selCat = null; state.padOpen = false;
  save(); render();
}

/* ================= カレンダー ================= */
function renderCal(main) {
  const ym = state.calYm;
  const [y, m] = ym.split('-').map(Number);
  const first = new Date(y, m - 1, 1);
  const startWd = first.getDay();
  const dim = daysInYm(ym);
  const today = todayIso();
  const msum = sumBy(entriesOfYm(ym));

  // 日別合計
  const byDay = {};
  for (const e of entriesOfYm(ym)) {
    const d = e.date;
    if (!byDay[d]) byDay[d] = { exp: 0, inc: 0 };
    byDay[d][kindOf(e)] += e.amount;
  }

  let cells = '', row = '<tr>';
  for (let i = 0; i < startWd; i++) row += '<td></td>';
  for (let day = 1; day <= dim; day++) {
    const iso = ym + '-' + String(day).padStart(2, '0');
    const s = byDay[iso];
    row += `<td class="${iso === today ? 'today' : ''} ${iso === state.calSel ? 'selday' : ''}" onclick="calSelect('${iso}')">
      <div class="d">${day}</div>
      ${s && s.exp ? `<div class="ce">-${s.exp.toLocaleString()}</div>` : ''}
      ${s && s.inc ? `<div class="ci">+${s.inc.toLocaleString()}</div>` : ''}
    </td>`;
    if ((startWd + day) % 7 === 0) { cells += row + '</tr>'; row = '<tr>'; }
  }
  if (row !== '<tr>') {
    const rest = 7 - ((startWd + dim) % 7);
    if (rest < 7) for (let i = 0; i < rest; i++) row += '<td></td>';
    cells += row + '</tr>';
  }

  // 表示中の月の明細（日付降順、日ごとにグループ化）
  const byDate = new Map();
  for (const e of entriesOfYm(ym)) {
    if (!byDate.has(e.date)) byDate.set(e.date, []);
    byDate.get(e.date).push(e);
  }
  const days = [...byDate.keys()].sort().reverse();
  let listHtml = '';
  for (const d of days) {
    const list = byDate.get(d);
    const ds = sumBy(list);
    listHtml += `<h2 id="day-${d}">${fmtIso(d)}　<span class="num ${ds.net < 0 ? 'amt-exp' : ''}" style="font-weight:400">${ds.net < 0 ? '-' : '+'}${yen(Math.abs(ds.net)).slice(1)}円</span></h2>
      <div class="card">${list.map(e => entryRowHtml(e)).join('')}</div>`;
  }
  if (!days.length) listHtml = '<div class="empty">この月の記録はありません</div>';

  main.innerHTML = `
  <div class="cal-fixed">
  <h1>カレンダー</h1>
  <div class="card" style="margin-bottom:6px">
    <div class="cal-head">
      <button onclick="chCalYm(-1)" aria-label="前月">◀</button>
      <span class="ym">${ymLabel(ym)}</span>
      <button onclick="chCalYm(1)" aria-label="翌月">▶</button>
    </div>
    <table class="cal">
      <thead><tr>${WD.map(w => `<th>${w}</th>`).join('')}</tr></thead>
      <tbody>${cells}</tbody>
    </table>
  </div>
  </div>
  <div class="cal-scroll">
  <div class="card">
    <div class="sumline">
      <div><div class="lb">収入</div><div class="v amt-inc">${yen(msum.inc)}</div></div>
      <div><div class="lb">支出</div><div class="v amt-exp">${yen(msum.exp)}</div></div>
      <div><div class="lb">合計</div><div class="v num ${msum.net < 0 ? 'amt-exp' : ''}">${msum.net < 0 ? '-' : ''}${yen(Math.abs(msum.net))}</div></div>
    </div>
    <div style="margin-top:6px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-2)">
      選択日: ${fmtIso(state.calSel)}
      <button class="ghost" style="padding:4px 8px" onclick="inputAt('${state.calSel}')">＋ この日に入力</button>
    </div>
  </div>
  ${listHtml}</div>`;
}
function chCalYm(n) { state.calYm = shiftYm(state.calYm, n); render(); }
// シングルタップ: 日を選択して下部明細の該当日へスクロール / ダブルタップ: その日をプリセットして入力タブへ
let calTapIso = null, calTapAt = 0;
function calSelect(iso) {
  const now = Date.now();
  const dbl = iso === calTapIso && (now - calTapAt) < 400;
  calTapIso = iso; calTapAt = now;
  if (dbl) { calTapIso = null; inputAt(iso); return; }
  state.calSel = iso;
  render();
  // 下部の明細一覧（.cal-scroll内）のうち、選択した日のセクションへスクロール
  const el = document.getElementById('day-' + iso);
  if (el && el.scrollIntoView) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function inputAt(iso) { state.date = iso; state.tab = 'input'; state.editId = null; render(); toTop(); }

/* ================= レポート ================= */
function renderReport(main) {
  const mode = state.repMode;
  const kind = state.repKind;
  const prefix = mode === 'month' ? state.repYm : state.repYear + '-';
  const label = mode === 'month' ? ymLabel(state.repYm) : state.repYear + '年';
  const entriesAll = store.entries.filter(e => e.date.startsWith(prefix));
  const entries = entriesAll.filter(e => kindOf(e) === kind);
  const total = entries.reduce((a, e) => a + e.amount, 0);

  // カテゴリ別集計（降順）
  const byCat = new Map();
  for (const e of entries) byCat.set(e.catId, (byCat.get(e.catId) || 0) + e.amount);
  let rows = [...byCat.entries()]
    .map(([catId, amt]) => ({ cat: catById(catId) || { name: '?', color: '#888' }, amt }))
    .sort((a, b) => b.amt - a.amt);

  // ドーナツは上位7+その他に折りたたむ（色はカテゴリ固有色）
  let slices = rows;
  if (rows.length > 8) {
    const rest = rows.slice(7).reduce((a, r) => a + r.amt, 0);
    slices = rows.slice(0, 7).concat([{ cat: { name: 'その他まとめ', color: '#898781' }, amt: rest }]);
  }

  const sums = sumBy(entriesAll);
  let html = `<h1>レポート</h1>
  <div class="card">
    <div class="chips">
      <button class="${mode === 'month' ? 'on' : ''}" onclick="setRepMode('month')">月間レポート</button>
      <button class="${mode === 'year' ? 'on' : ''}" onclick="setRepMode('year')">年間レポート</button>
    </div>
    <div class="cal-head">
      <button onclick="chRep(-1)" aria-label="前へ">◀</button>
      <span class="ym">${label}</span>
      <button onclick="chRep(1)" aria-label="次へ">▶</button>
    </div>
    <div class="repsum">
      <div class="box"><span>支出</span><b class="amt-exp">-${yen(sums.exp)}</b></div>
      <div class="box"><span>収入</span><b class="amt-inc">+${yen(sums.inc)}</b></div>
      <div class="box net"><span>収支</span><b class="${sums.net < 0 ? 'amt-exp' : ''}">${sums.net < 0 ? '-' : ''}${yen(Math.abs(sums.net))}</b></div>
    </div>
    <div class="kindtabs">
      <button class="${kind === 'exp' ? 'on-exp' : ''}" onclick="setRepKind('exp')">支出</button>
      <button class="${kind === 'inc' ? 'on-inc' : ''}" onclick="setRepKind('inc')">収入</button>
    </div>`;

  if (!total) {
    html += `<div class="empty">この${mode === 'month' ? '月' : '年'}の${kind === 'exp' ? '支出' : '収入'}はありません</div></div>`;
  } else {
    html += `<div style="display:flex;justify-content:center;padding:6px 0">${donutSvg(slices, total, kind)}</div>` +
      rows.map(r => `<div class="rep-row">
        <span class="cdot" style="background:${r.cat.color}"></span>
        <span>${esc(r.cat.name)}</span>
        <span class="amt">${yen(r.amt)}</span>
        <span class="pct">${(r.amt / total * 100).toFixed(1)}%</span>
      </div>`).join('') + `</div>`;
  }

  // 年間モード: 月別内訳（収入・支出・収支）
  if (mode === 'year') {
    const months = new Map();
    for (const e of entriesAll) {
      const m = e.date.slice(5, 7);
      if (!months.has(m)) months.set(m, { exp: 0, inc: 0 });
      months.get(m)[kindOf(e)] += e.amount;
    }
    const mRows = [...months.entries()].sort((a, b) => a[0].localeCompare(b[0]));
    const ySum = sumBy(entriesAll);
    html += `<h2>月別内訳</h2><div class="card" style="overflow-x:auto">`;
    if (!mRows.length) {
      html += '<div class="empty">この年の記録はありません</div>';
    } else {
      html += `<table class="sum">
        <thead><tr><th>月</th><th>収入</th><th>支出</th><th>収支</th></tr></thead>
        <tbody>` + mRows.map(([m, s]) => {
          const net = s.inc - s.exp;
          return `<tr><td>${Number(m)}月</td><td>${yen(s.inc)}</td><td>${yen(s.exp)}</td><td>${net < 0 ? '-' : ''}${yen(Math.abs(net))}</td></tr>`;
        }).join('') + `
        <tr><td><b>合計</b></td><td><b>${yen(ySum.inc)}</b></td><td><b>${yen(ySum.exp)}</b></td><td><b>${ySum.net < 0 ? '-' : ''}${yen(Math.abs(ySum.net))}</b></td></tr>
        </tbody></table>`;
    }
    html += `</div>`;
  }

  main.innerHTML = html;
}
function chRep(n) {
  if (state.repMode === 'month') state.repYm = shiftYm(state.repYm, n);
  else state.repYear += n;
  render();
}
function setRepMode(m) { state.repMode = m; render(); }
function setRepKind(k) { state.repKind = k; render(); }

function donutSvg(slices, total, kind) {
  const size = 260, cx = 130, cy = 130, r = 92, w = 52;
  let a0 = -Math.PI / 2;
  let paths = '', labels = '';
  for (const s of slices) {
    const frac = s.amt / total;
    const a1 = a0 + frac * Math.PI * 2;
    // 2pxのサーフェス間隔（stroke）で区切る
    if (frac >= 0.999) {
      paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.cat.color}" stroke-width="${w}"/>`;
    } else {
      const large = frac > 0.5 ? 1 : 0;
      const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
      const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
      paths += `<path d="M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x1.toFixed(2)} ${y1.toFixed(2)}"
        fill="none" stroke="${s.cat.color}" stroke-width="${w}"/>`;
      // スライス境界の隙間
      paths += `<line x1="${cx}" y1="${cy}" x2="${(cx + (r + w) * Math.cos(a1)).toFixed(2)}" y2="${(cy + (r + w) * Math.sin(a1)).toFixed(2)}" stroke="var(--surface-1)" stroke-width="2"/>`;
    }
    // 大きいスライスにはカテゴリ名を直接ラベル表示
    if (frac >= 0.13) {
      const mid = (a0 + a1) / 2;
      const lx = cx + r * Math.cos(mid), ly = cy + r * Math.sin(mid);
      labels += `<text x="${lx.toFixed(1)}" y="${(ly + 4).toFixed(1)}" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">${esc(s.cat.name)}</text>`;
    }
    a0 = a1;
  }
  return `<svg width="260" height="260" viewBox="0 0 ${size} ${size}" role="img" aria-label="カテゴリ別割合" style="max-width:100%">
    ${paths}${labels}

}

/* ================= 予算 ================= */
function renderBudget(main) {
  if (state.budEdit) { renderBudgetEdit(main); return; }
  const ym = state.budYm;
  const expEntries = entriesOfYm(ym).filter(e => kindOf(e) === 'exp');
  const spentBy = new Map();
  let totalSpent = 0;
  for (const e of expEntries) {
    spentBy.set(e.catId, (spentBy.get(e.catId) || 0) + e.amount);
    totalSpent += e.amount;
  }
  const cats = catsOf('exp');
  const bud = budgetForYm(ym);
  const catTotal = cats.reduce((a, c) => a + (Number(bud.cats[c.id]) || 0), 0);
  // 予算合計が未設定ならカテゴリ予算の合計を使う
  const totalBudget = bud.total || catTotal;

  function rowHtml(name, color, budget, spent) {
    if (!budget && !spent) {
      return `<div class="budget-row">
        <div class="budget-top">${color ? `<span class="cdot" style="background:${color}"></span>` : ''}<span>${esc(name)}</span><span class="amt" style="color:var(--muted)">未設定</span></div>
        <div class="bar"></div>
        <div class="budget-sub"><span></span><span>-</span></div>
      </div>`;
    }
    const remain = (budget || 0) - spent;
    const pct = budget ? Math.min(100, spent / budget * 100) : (spent ? 100 : 0);
    const pctLabel = budget ? Math.round(spent / budget * 100) + '%' : '100%';
    return `<div class="budget-row">
      <div class="budget-top">
        ${color ? `<span class="cdot" style="background:${color}"></span>` : ''}<span>${esc(name)}</span>
        <span class="amt ${remain < 0 ? 'amt-exp' : ''}">残り ${remain < 0 ? '-' : ''}${yen(Math.abs(remain))}</span>
      </div>
      <div class="bar"><i style="width:${pct}%;${color ? 'background:' + color : ''}"></i></div>
      <div class="budget-sub"><span>予算 ${budget ? yen(budget) : '未設定'}　支出 ${yen(spent)}</span><span>${pctLabel}</span></div>
    </div>`;
  }

  main.innerHTML = `
  <h1>予算</h1>
  <div class="card">
    <div class="cal-head">
      <button onclick="chBudYm(-1)" aria-label="前月">◀</button>
      <span class="ym">${ymLabel(ym)}</span>
      <button onclick="chBudYm(1)" aria-label="翌月">▶</button>
    </div>
    ${rowHtml('予算合計', null, totalBudget, totalSpent)}
    <button class="primary" style="width:100%;margin-top:10px" onclick="openBudgetEdit()">予算を設定</button>
  </div>
  <div class="card">
    ${cats.map(c => rowHtml(c.name, c.color, Number(bud.cats[c.id]) || 0, spentBy.get(c.id) || 0)).join('')}
    <div class="hint">「予算を設定」から月ごと・カテゴリごとに変更できます。保存した予算はその月から先の月にも引き継がれます。</div>
  </div>`;
}

function setBudDraftTotal(v) {

function setBudDraftCat(id, v) {

function saveBudgetEdit() {

  store.budgets[ym] = { total: Math.max(0, Math.round(Number(state.budDraft.total) || 0)), cats };
  state.budYm = ym;
  state.budEdit = null; state.budDraft = null; state.budDirty = false;
  save(); render(); toTop();
}

function setSetKind(k) { state.setKind = k; render(); }
function renameCat(id, v) {
  const c = catById(id);
  const name = v.trim();
  if (c && name) c.name = name;
  save(); render();
}
function setCatIcon(id, v) { const c = catById(id); if (c) c.icon = v; save(); render(); }
function setCatColor(id, v) { const c = catById(id); if (c && /^#[0-9a-fA-F]{6}$/.test(v)) c.color = v; save(); render(); }
// ドラッグ確定時に呼ばれる: 指定kindのカテゴリをids順に並び替え、
// noInputIdsに入っているものを「入力タブで非表示」にする（省略時は表示設定を変えない）
function reorderCats(kind, ids, noInputIds) {
  const mine = ids.map(id => catById(id)).filter(c => c && c.kind === kind);
  if (mine.length !== store.categories.filter(c => c.kind === kind).length) return; // 不整合なら何もしない
  const others = store.categories.filter(c => c.kind !== kind);
  store.categories = kind === 'exp' ? mine.concat(others) : others.concat(mine);
  if (noInputIds) {
    const hide = new Set(noInputIds);
    for (const c of mine) { if (hide.has(c.id)) c.noInput = true; else delete c.noInput; }
  }
  save(); render();
}
// ☰ハンドルの押下でドラッグ開始（ポインタイベント。iOSはtouch-action:noneでスクロールと分離）
// 「入力タブで非表示」見出し（.catsec-noinput）を跨いでドロップでき、見出しより下の行が非表示になる
function dragCat(ev, id) {
  ev.preventDefault();
  const row = ev.target.closest('.exrow');
  if (!row) return;
  const container = row.parentNode;
  row.classList.add('dragging');
  const addRow = container.querySelector('.addrow');
  const divider = container.querySelector('.catsec-noinput');
  const move = e => {
    const y = e.clientY;
    let before = null;
    for (const r of container.querySelectorAll('.exrow, .catsec-noinput')) {
      if (r === row) continue;
      const rc = r.getBoundingClientRect();
      if (y < rc.top + rc.height / 2) { before = r; break; }
    }
    container.insertBefore(row, before || addRow);
  };
  const up = () => {
    document.removeEventListener('pointermove', move);
    document.removeEventListener('pointerup', up);
    document.removeEventListener('pointercancel', up);
    row.classList.remove('dragging');
    const ids = [];
    const noInputIds = [];
    let afterDivider = false;
    for (const el of container.children) {
      if (el === divider) { afterDivider = true; continue; }
      if (el.classList && el.classList.contains('exrow')) {
        ids.push(el.dataset.cid);
        if (afterDivider) noInputIds.push(el.dataset.cid);
      }
    }
    reorderCats(state.setKind, ids, noInputIds);
  };
  document.addEventListener('pointermove', move);
  document.addEventListener('pointerup', up);
  document.addEventListener('pointercancel', up);
}
function addCat() {
  const name = document.getElementById('newCatName').value.trim();
  if (!name) return;
  const used = catsOf(state.setKind, true).length;
  const icon = document.getElementById('newCatIcon').value || (state.setKind === 'exp' ? '🐷' : '💰');
  const colorV = document.getElementById('newCatColor').value;
  const color = /^#[0-9a-fA-F]{6}$/.test(colorV) ? colorV : COLOR_POOL[used % COLOR_POOL.length];
  store.categories.push({ id: newId('c'), name, kind: state.setKind, color, icon });
  save(); render();
}
function addRec() {
  const catId = document.getElementById('recCat').value;

/* ================= クラウド自動バックアップ ================= */
// アプリを開いたとき1日1回、非公開GitHubリポジトリへ全データをアップロードする。
// トークン（Fine-grained PAT）は端末のlocalStorageにのみ保存され、エクスポートにも含まれない
const CLOUD_REPO = 'prkxfzmfx-pixel/app-backups';
const CLOUD_FILE = 'kakeibo.json';
const CLOUD_TOKEN_KEY = 'kakeibo.cloudToken';
const CLOUD_META_KEY = 'kakeibo.cloudMeta';

function cloudMeta() { try { return JSON.parse(localStorage.getItem(CLOUD_META_KEY) || '{}'); } catch (e) { return {}; } }
function setCloudMeta(m) { localStorage.setItem(CLOUD_META_KEY, JSON.stringify(m)); }
function b64utf8(s) {
  const bytes = new TextEncoder().encode(s);
  let bin = '';
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin);
}
function cloudApi() { return `https://api.github.com/repos/${CLOUD_REPO}/contents/${CLOUD_FILE}`; }
function cloudHeaders(token) { return { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' }; }

async function cloudBackup(force) {
  const token = localStorage.getItem(CLOUD_TOKEN_KEY);
  if (!token) return { skipped: 'no-token' };
  const today = todayIso();
  if (!force && cloudMeta().last === today) return { skipped: 'done-today' };
  try {
    let sha;
    const g = await fetch(cloudApi(), { headers: cloudHeaders(token) });
    if (g.status === 200) sha = (await g.json()).sha;
    const res = await fetch(cloudApi(), {
      method: 'PUT',
      headers: cloudHeaders(token),
      body: JSON.stringify({ message: '自動バックアップ ' + today, content: b64utf8(JSON.stringify(store)), ...(sha ? { sha } : {}) }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    setCloudMeta({ last: today, ok: true });
    if (state.tab === 'settings') render();
    return { ok: true };
  } catch (e) {
    setCloudMeta({ ...cloudMeta(), ok: false, err: String(e && e.message || e) });
    if (state.tab === 'settings') render();
    return { error: String(e && e.message || e) };
  }
}
function cloudSettingsHtml() {
  const meta = cloudMeta();
  const tokenSet = !!localStorage.getItem(CLOUD_TOKEN_KEY);
  let status;
  if (!tokenSet) status = '未設定（トークンを貼り付けると有効になります）';
  else if (!meta.last) status = 'トークン設定済み・バックアップ未実行';
  else status = `最終バックアップ: ${meta.last}` + (meta.ok === false ? `　⚠️前回エラー: ${esc(meta.err || '')}` : ' ✅');
  return `
    <div class="hint">アプリを開いたとき1日1回、非公開リポジトリ（${CLOUD_REPO}）へ自動バックアップします。過去の世代も履歴に残ります。</div>
    <div style="font-size:13px">${status}</div>
    <div class="addrow">
      <input type="password" id="cloudPin" inputmode="numeric" maxlength="6" placeholder="かんたん設定コード（6桁）" style="flex:1">
      <button class="primary" onclick="applyPinToken()">適用</button>
    </div>
    <div class="addrow">
      <input type="password" id="cloudToken" placeholder="${tokenSet ? '設定済み（変更時のみ入力）' : 'GitHubトークンを貼り付け'}" style="flex:1">
      <button class="primary" onclick="saveCloudToken()">保存</button>
    </div>
    <button onclick="cloudBackupNow()">☁️ 今すぐバックアップ</button>
    <button onclick="cloudRestore()">⬇️ クラウドから復元</button>
    ${tokenSet ? '<button class="danger" onclick="clearCloudToken()">バックアップ停止（トークン削除）</button>' : ''}`;
}
/* かんたん設定: 6桁コードを入力すると、埋め込みの暗号文からトークンを復号して適用する。
   PIN_BLOB は base64(salt16 | iv12 | AES-GCM暗号文)。コード本体・平文トークンはリポジトリに置かない。
   コード誤り＝AES-GCMの復号失敗として検出する（コードの照合値も持たない）。
   暗号文の再生成: node tools\make-pin-blob.js <6桁コード> <トークン> */
const PIN_BLOB = 'brr+ly+ynAzA7q47ATgDFrjZJPKOgA0/m4mvi9Rg+9DKImr0jx+JozO5PxyiyJ/SLfclT6r0YSZyySyo86t6O1o+20zwg/YEZDLH/2Lug6midNSjc+nUg8q2EN+QkdgnSUzlWl5Jd+JrLBpBEQlAiiUuelu3z2bJ5ygsaCjZOSmVefNlNQ6c7fM=';
async function decryptWithPin(pin, blobB64) {
  const raw = Uint8Array.from(atob(blobB64), ch => ch.charCodeAt(0));
  const salt = raw.slice(0, 16), iv = raw.slice(16, 28), ct = raw.slice(28);
  const keyMat = await crypto.subtle.importKey('raw', new TextEncoder().encode(pin), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 310000, hash: 'SHA-256' },
    keyMat, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
  return new TextDecoder().decode(pt);
}
async function applyPinToken() {
  const pin = document.getElementById('cloudPin').value.trim();
  let token;
  try {
    if (!/^\d{6}$/.test(pin) || !PIN_BLOB) throw new Error('bad pin');
    token = await decryptWithPin(pin, PIN_BLOB);
  } catch (e) {
    alert('パスワードが間違っています');
    return;
  }
  // 既存の保存フロー（クラウド側バックアップの確認→復元提案つき）に乗せる
  document.getElementById('cloudToken').value = token;
  await saveCloudToken();
}
async function saveCloudToken() {
  const v = document.getElementById('cloudToken').value.trim();
  if (!v) { alert('トークンを入力してください'); return; }
  localStorage.setItem(CLOUD_TOKEN_KEY, v);
  // 先にクラウド側の既存バックアップを確認する（新端末の空データで上書きしない）
  try {
    const res = await fetch(cloudApi(), { headers: { 'Authorization': 'Bearer ' + v, 'Accept': 'application/vnd.github.raw+json' } });
    if (res.ok) {
      const s = JSON.parse(await res.text());
      if (s && Array.isArray(s.entries) && s.entries.length > store.entries.length &&
          confirm(`クラウドに既存のバックアップ（${s.entries.length}件）が見つかりました。この端末に復元しますか？\n\n（キャンセルすると、この端末のデータ（${store.entries.length}件）が今後のバックアップとして上書きされます）`)) {
        store = normalize(s);
        save();
        setCloudMeta({ last: todayIso(), ok: true });
        render();
        alert('復元完了。自動バックアップも有効になりました');
        return;
      }
    } else if (res.status !== 404) {
      throw new Error('HTTP ' + res.status);
    }
    const r = await cloudBackup(true);
    alert(r.ok ? '設定完了。バックアップに成功しました' : 'バックアップ失敗: ' + (r.error || ''));
    render();
  } catch (e) {
    alert('接続失敗: ' + (e && e.message || e) + '\nトークンの権限（app-backupsリポのContents: Read and write）を確認してください');
    render();
  }
}
function clearCloudToken() {
  if (!confirm('自動バックアップを停止しますか？（トークンを削除。クラウド上の既存バックアップは残ります）')) return;
  localStorage.removeItem(CLOUD_TOKEN_KEY);
  render();
}
function cloudBackupNow() {
  cloudBackup(true).then(r => alert(r.ok ? 'バックアップ完了' : (r.skipped === 'no-token' ? 'トークンが未設定です' : 'バックアップ失敗: ' + (r.error || ''))));
}
async function cloudRestore() {
  const token = localStorage.getItem(CLOUD_TOKEN_KEY);
  if (!token) { alert('トークンが未設定です'); return; }
  try {
    const res = await fetch(cloudApi(), { headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.raw+json' } });
    if (!res.ok) throw new Error(res.status === 404 ? 'クラウドにバックアップがまだありません' : 'HTTP ' + res.status);
    const s = JSON.parse(await res.text());
    if (!s || !Array.isArray(s.categories) || !Array.isArray(s.entries)) throw new Error('形式が違います');
    if (!confirm(`クラウドのバックアップ（${s.entries.length}件）で現在のデータ（${store.entries.length}件）を置き換えます。よろしいですか？`)) return;
    store = normalize(s);
    save(); render();
    alert('復元完了');
  } catch (e) { alert('復元失敗: ' + (e && e.message || e)); }
}

/* ================= データ入出力 ================= */
function buildCsv() {
  const head = '日付,種別,カテゴリ,金額,メモ';
  const lines = [...store.entries]
    .sort((a, b) => a.date.localeCompare(b.date))
    .map(e => {
      const c = catById(e.catId) || { name: '?', kind: 'exp' };
      const memo = '"' + String(e.memo || '').replace(/"/g, '""') + '"';
      return [e.date, c.kind === 'exp' ? '支出' : '収入', c.name, e.amount, memo].join(',');
    });
  return '﻿' + [head, ...lines].join('\r\n');
}
function downloadFile(name, content, type) {
  const blob = new Blob([content], { type });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
}
function exportCsv() { downloadFile(`kakeibo-${todayIso().replace(/-/g, '')}.csv`, buildCsv(), 'text/csv'); }
function exportJson() { downloadFile(`kakeibo-backup-${todayIso().replace(/-/g, '')}.json`, JSON.stringify(store, null, 1), 'application/json'); }
document.getElementById('importFile').addEventListener('change', function () {
  const file = this.files[0];
  this.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const s = JSON.parse(reader.result);
      if (!s || !Array.isArray(s.categories) || !Array.isArray(s.entries)) throw new Error('形式が違います');
      if (!confirm(`インポートすると現在のデータ（${store.entries.length}件）を置き換えます。よろしいですか？`)) return;
      store = normalize(s);
      save(); render();
      alert(`インポート完了: ${store.entries.length}件`);
    } catch (e) {
      alert('インポート失敗: ' + e.message);
    }
  };
  reader.readAsText(file);
});
function wipeAll() {
  if (!confirm('すべての記録・カテゴリ設定を削除します。よろしいですか？')) return;
  if (!confirm('本当に削除しますか？（エクスポートしていないデータは戻せません）')) return;
  localStorage.removeItem(LS_KEY);
  store = loadStore();
  render();
}

/* ================= 起動 ================= */
// 実測の画面高さをCSS変数に渡す（iOSスタンドアロンのdvh過少計算対策）。
// env(safe-area-inset-top)が効かない場合はステータスバー分をフォールバック確保
function fitViewport() {
  let h = window.innerHeight;
  if (navigator.standalone && window.screen) {
    // ホーム画面起動時はinnerHeightがステータスバー分小さく報告されるため、
    // 端末の物理画面高を使う（screen.width/heightはiOSでは向きによらず縦基準で固定）
    const portrait = !window.matchMedia || window.matchMedia('(orientation: portrait)').matches;
    h = portrait ? screen.height : screen.width;
  }
  if (h) document.documentElement.style.setProperty('--appH', h + 'px');
  if (navigator.standalone && parseFloat(getComputedStyle(document.body).paddingTop) < 20) {
    document.documentElement.style.setProperty('--safe-top', '59px');
  }
}
window.addEventListener('resize', fitViewport);
window.addEventListener('orientationchange', fitViewport);
fitViewport();
applyRecurring();
render();
cloudBackup();
// アプリを閉じずに日をまたいで再表示したときもバックアップされるように
document.addEventListener('visibilitychange', () => { if (!document.hidden) cloudBackup(); });
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  navigator.serviceWorker.register('sw.js');
}
</script>
